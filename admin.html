<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { background-color: #fbcfe8; color: #db2777; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r shadow-sm flex flex-col h-full shrink-0">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-black text-gray-800">Celebrift <span class="text-pink-500">Admin</span></h1>
            <a href="index.html" class="text-xs text-gray-500 hover:text-pink-500 mt-1 inline-block">← View Live Site</a>
        </div>
        <nav class="flex-grow p-4 space-y-2 overflow-y-auto">
            <button onclick="switchTab('listings')" id="btn-listings" class="nav-btn active w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">📦 Listings</button>
            <button onclick="switchTab('faqs')" id="btn-faqs" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">❓ Global FAQs</button>
            <button onclick="switchTab('tnc')" id="btn-tnc" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">📄 Terms & Conditions</button>
            <button onclick="switchTab('refunds')" id="btn-refunds" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">💸 Refund & Returns</button>
            <button onclick="switchTab('about')" id="btn-about" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">🏢 About Us</button>
            <button onclick="switchTab('disclaimer')" id="btn-disclaimer" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">⚠️ Disclaimer</button>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-gray-800">Logout</button>
        </div>
    </aside>

    <main class="flex-grow overflow-y-auto p-8 h-full bg-gray-50 w-full">

        <div id="tab-listings" class="tab-content active max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Manage Listings</h2>
            </div>
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="xl:col-span-1 bg-white p-6 rounded-2xl shadow-sm border h-fit">
                    <h3 id="form-title" class="text-lg font-bold mb-6">Add New Listing</h3>
                    <form id="add-form" class="space-y-4">
                        <input type="text" id="title" placeholder="Title" class="w-full p-3 border rounded-lg bg-gray-50" required>
                        <input type="text" id="price" placeholder="Price (e.g. ₹2,499)" class="w-full p-3 border rounded-lg bg-gray-50" required>
                        <select id="category" class="w-full p-3 border rounded-lg bg-gray-50">
                            <option value="birthday">Birthday</option>
                            <option value="anniversary">Anniversary</option>
                            <option value="baby-shower">Baby Shower</option>
                        </select>
                        <textarea id="description" placeholder="Description" rows="4" class="w-full p-3 border rounded-lg bg-gray-50"></textarea>
                        
                        <div class="border rounded-lg p-3 bg-gray-50">
                            <label class="block text-xs font-bold text-gray-500 mb-1">Upload Decoration Image</label>
                            <input type="file" id="image-upload" accept="image/*" class="w-full text-sm">
                            <input type="hidden" id="existing-image-url"> </div>

                        <button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold transition-colors">Save Listing</button>
                        <button type="button" id="cancel-edit-btn" onclick="resetForm()" class="hidden w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-bold mt-2 hover:bg-gray-300 transition-colors">Cancel Edit</button>
                    </form>
                </div>
                <div class="xl:col-span-2 bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="text-lg font-bold mb-6">Current Inventory</h3>
                    <div id="admin-product-list" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="tab-faqs" class="tab-content max-w-4xl">
            <h2 class="text-2xl font-bold mb-6">Global Site FAQs</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <p class="text-gray-500 mb-4 text-sm">Enter your global FAQs here (you can use HTML formatting):</p>
                <textarea id="faqs-content" class="w-full p-4 border rounded-xl bg-gray-50 h-[30rem] focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Q: What is your cancellation policy?&#10;A: We offer full refunds..."></textarea>
                <button onclick="saveSetting(this, 'faqs', 'faqs-content')" class="mt-4 bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save FAQs</button>
            </div>
        </div>

        <div id="tab-tnc" class="tab-content max-w-4xl">
            <h2 class="text-2xl font-bold mb-6">Terms & Conditions</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <textarea id="tnc-content" class="w-full p-4 border rounded-xl bg-gray-50 h-[30rem] focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter terms and conditions..."></textarea>
                <button onclick="saveSetting(this, 'tnc', 'tnc-content')" class="mt-4 bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save Terms</button>
            </div>
        </div>

        <div id="tab-refunds" class="tab-content max-w-4xl">
            <h2 class="text-2xl font-bold mb-6">Refunds & Returns</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <textarea id="refunds-content" class="w-full p-4 border rounded-xl bg-gray-50 h-[30rem] focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter refund policy..."></textarea>
                <button onclick="saveSetting(this, 'refunds', 'refunds-content')" class="mt-4 bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save Policy</button>
            </div>
        </div>

        <div id="tab-about" class="tab-content max-w-4xl">
            <h2 class="text-2xl font-bold mb-6">About Us</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <textarea id="about-content" class="w-full p-4 border rounded-xl bg-gray-50 h-[30rem] focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter about us details..."></textarea>
                <button onclick="saveSetting(this, 'about', 'about-content')" class="mt-4 bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save About Us</button>
            </div>
        </div>

        <div id="tab-disclaimer" class="tab-content max-w-4xl">
            <h2 class="text-2xl font-bold mb-6">Disclaimer</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <textarea id="disclaimer-content" class="w-full p-4 border rounded-xl bg-gray-50 h-[30rem] focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter disclaimer..."></textarea>
                <button onclick="saveSetting(this, 'disclaimer', 'disclaimer-content')" class="mt-4 bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save Disclaimer</button>
            </div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin-login.html';

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }

        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // --- GLOBAL SETTINGS LOGIC ---
        async function saveSetting(btnElement, key, textareaId) {
            const content = document.getElementById(textareaId).value;
            const originalText = btnElement.textContent;
            
            btnElement.textContent = "Saving...";
            btnElement.disabled = true;
            
            try {
                const res = await fetch(`/api/settings/${key}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ content })
                });
                
                if (res.ok) {
                    btnElement.textContent = "Saved!";
                    btnElement.classList.replace('bg-pink-500', 'bg-green-500');
                    setTimeout(() => {
                        btnElement.textContent = originalText;
                        btnElement.classList.replace('bg-green-500', 'bg-pink-500');
                        btnElement.disabled = false;
                    }, 2000);
                } else {
                    alert("Failed to save. Check server logs.");
                    btnElement.textContent = originalText;
                    btnElement.disabled = false;
                }
            } catch (e) {
                alert("Error connecting to server.");
                btnElement.textContent = originalText;
                btnElement.disabled = false;
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                
                if (settings['faqs']) document.getElementById('faqs-content').value = settings['faqs'];
                if (settings['tnc']) document.getElementById('tnc-content').value = settings['tnc'];
                if (settings['refunds']) document.getElementById('refunds-content').value = settings['refunds'];
                if (settings['about']) document.getElementById('about-content').value = settings['about'];
                if (settings['disclaimer']) document.getElementById('disclaimer-content').value = settings['disclaimer'];
            } catch (e) {
                console.error("Failed to load global settings");
            }
        }

        // --- LISTING MANAGEMENT LOGIC (With Base64 Uploads) ---
        async function loadAdminProducts() {
            const res = await fetch('/api/decorations');
            const data = await res.json();
            document.getElementById('admin-product-list').innerHTML = data.map(item => `
                <div class="flex items-center justify-between p-3 border rounded-xl hover:bg-gray-50 transition">
                    <div class="flex items-center gap-4">
                        <img src="${item.image_url}" class="w-16 h-16 object-cover rounded-lg border bg-white">
                        <div>
                            <h3 class="font-bold text-gray-800 line-clamp-1">${item.title}</h3>
                            <p class="text-xs font-bold text-pink-500 uppercase tracking-wider">${item.category}</p>
                            <p class="text-sm text-gray-500 mt-1">${item.price_range}</p>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row gap-2">
                        <button onclick="editProduct('${item.slug}')" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-200 transition">Edit</button>
                        <button onclick="deleteProduct('${item.slug}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-100 transition">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = "Processing Upload...";
            btn.disabled = true;

            const fileInput = document.getElementById('image-upload');
            const existingImage = document.getElementById('existing-image-url').value;
            let finalImageUrl = existingImage;

            // Convert file to Base64 string if a new file was selected
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                finalImageUrl = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file); // Converts to base64 string
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
            }

            if (!finalImageUrl) {
                alert("Please upload an image.");
                btn.textContent = "Save Listing";
                btn.disabled = false;
                return;
            }

            // Generate URL-friendly slug from title
            const generatedSlug = document.getElementById('title').value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            const payload = {
                slug: generatedSlug,
                title: document.getElementById('title').value,
                price_range: document.getElementById('price').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                image_url: finalImageUrl // This is now the Base64 text string
            };

            try {
                const res = await fetch('/api/decorations', {
                    method: 'POST', // Note: Make sure your index.py POST route handles upserts (ON CONFLICT DO UPDATE) if you want the same route to handle edits securely.
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Listing saved successfully!");
                    resetForm();
                    loadAdminProducts(); // Refresh the list
                } else {
                    alert("Failed to save. Check your inputs.");
                }
            } catch (err) {
                alert("Server error.");
            }
            
            btn.disabled = false;
            btn.textContent = "Save Listing";
        });

        async function editProduct(slug) {
            try {
                const res = await fetch(`/api/decorations/${slug}`);
                const item = await res.json();
                
                document.getElementById('title').value = item.title;
                document.getElementById('price').value = item.price_range;
                document.getElementById('category').value = item.category;
                document.getElementById('description').value = item.description;
                
                // Store the existing Base64 string in the hidden input
                document.getElementById('existing-image-url').value = item.image_url;
                
                // Update UI to show edit mode
                const btn = document.getElementById('submit-btn');
                document.getElementById('form-title').innerText = "Edit Listing (Leave image blank to keep current)";
                btn.textContent = "Update Listing";
                btn.classList.replace('bg-pink-500', 'bg-blue-600');
                
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                
                // Switch back to listings tab and scroll to top
                switchTab('listings');
                document.getElementById('tab-listings').scrollTo({top: 0, behavior:'smooth'});
            } catch (e) {
                alert("Failed to fetch product details.");
            }
        }

        async function deleteProduct(slug) {
            if(!confirm("Are you sure you want to delete this listing permanently?")) return;
            try {
                await fetch(`/api/decorations/${slug}`, { 
                    method: 'DELETE', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                loadAdminProducts();
            } catch (e) {
                alert("Failed to delete.");
            }
        }

        function resetForm() {
            document.getElementById('add-form').reset();
            document.getElementById('existing-image-url').value = '';
            document.getElementById('form-title').innerText = "Add New Listing";
            
            const btn = document.getElementById('submit-btn');
            btn.textContent = "Save Listing";
            btn.classList.replace('bg-blue-600', 'bg-pink-500');
            
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        // Initialize page
        loadAdminProducts();
        loadSettings();
    </script>
</body>
</html>
