<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Celebrift</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-gray-900 text-white p-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <img src="logo.png" onerror="this.style.display='none'" class="w-6 h-6"> Celebrift Admin
        </h1>
        <div class="flex gap-4">
            <button onclick="switchTab('products')" class="text-pink-400 hover:text-white font-bold border-b-2 border-transparent hover:border-pink-400 pb-1 transition">Products</button>
            <button onclick="switchTab('reviews')" class="text-pink-400 hover:text-white font-bold border-b-2 border-transparent hover:border-pink-400 pb-1 transition">Reviews</button>
            <a href="index.html" class="text-sm bg-gray-800 px-4 py-2 rounded-lg hover:bg-gray-700 transition">View Site</a>
        </div>
    </nav>

    <div id="tab-products" class="max-w-7xl mx-auto w-full p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 bg-white p-6 rounded-3xl shadow-sm border h-fit">
            <h2 id="form-title" class="text-xl font-black mb-6 text-gray-800">Add New Decoration</h2>
            <form id="add-form" class="space-y-4">
                <input type="hidden" id="slug">
                <input type="text" id="title" required placeholder="Title" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-pink-500">
                <input type="text" id="price" required placeholder="Price (e.g. ₹2,499)" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-pink-500">
                <select id="category" class="w-full p-4 border rounded-xl outline-none">
                    <option value="birthday">Birthday</option>
                    <option value="anniversary">Anniversary</option>
                    <option value="baby-shower">Baby Shower</option>
                    <option value="romantic">Romantic</option>
                </select>
                <textarea id="description" required placeholder="Description" rows="3" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-pink-500"></textarea>
                
                <div class="p-4 border rounded-xl bg-gray-50">
                    <label class="block font-bold text-sm mb-2 text-gray-700">Upload Images (Select multiple)</label>
                    <input type="file" id="images" multiple accept="image/*" class="w-full text-sm">
                    <p class="text-xs text-gray-400 mt-2">Leave blank when editing to keep old images.</p>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white py-4 rounded-xl font-black text-lg hover:bg-pink-600 transition">Save Listing</button>
            </form>
        </div>

        <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border overflow-hidden">
            <h2 class="text-xl font-black mb-6 text-gray-800">Current Listings</h2>
            <div id="admin-product-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="tab-reviews" class="hidden max-w-7xl mx-auto w-full p-4 md:p-8">
        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <h2 class="text-xl font-black mb-6 text-gray-800">Manage Customer Reviews</h2>
            <div id="admin-review-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin-login.html';

        let existingImages = []; 

        function switchTab(tab) {
            document.getElementById('tab-products').classList.add('hidden');
            document.getElementById('tab-reviews').classList.add('hidden');
            document.getElementById('tab-' + tab).classList.remove('hidden');
            if(tab === 'reviews') loadAdminReviews();
        }

        async function loadAdminProducts() {
            const res = await fetch('/api/decorations');
            const data = await res.json();
            document.getElementById('admin-product-list').innerHTML = data.map(item => `
                <div class="flex flex-col md:flex-row items-center justify-between p-5 border rounded-2xl hover:bg-gray-50 transition gap-4">
                    <div class="flex items-center gap-5 w-full">
                        <img src="${item.images[0]}" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-xl shadow-sm border">
                        <div>
                            <h3 class="font-bold text-gray-800">${item.title}</h3>
                            <p class="text-sm text-gray-500">${item.category} • ${item.price_range}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto justify-end">
                        <button onclick="editProduct('${item.slug}')" class="bg-blue-100 text-blue-600 px-5 py-2 rounded-xl text-sm font-bold hover:bg-blue-600 hover:text-white transition">Edit</button>
                        <button onclick="deleteProduct('${item.slug}')" class="bg-red-100 text-red-600 px-5 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function editProduct(slug) {
            const res = await fetch(`/api/decorations/${slug}`);
            const item = await res.json();
            document.getElementById('slug').value = item.slug;
            document.getElementById('title').value = item.title;
            document.getElementById('price').value = item.price_range;
            document.getElementById('category').value = item.category;
            document.getElementById('description').value = item.description;
            existingImages = item.images; 
            
            const btn = document.getElementById('submit-btn');
            btn.textContent = "Update Listing";
            btn.classList.replace('bg-pink-500', 'bg-blue-600');
            window.scrollTo({top: 0, behavior:'smooth'});
        }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = 'Saving...';

            const slugInput = document.getElementById('slug').value;
            const title = document.getElementById('title').value;
            const slug = slugInput || title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            const files = document.getElementById('images').files;
            let finalImages = existingImages; 

            if(files.length > 0) {
                const base64Promises = Array.from(files).map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                });
                finalImages = await Promise.all(base64Promises);
            }

            await fetch('/api/decorations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    slug: slug, title: title,
                    category: document.getElementById('category').value,
                    price_range: document.getElementById('price').value,
                    description: document.getElementById('description').value,
                    images: finalImages
                })
            });

            document.getElementById('add-form').reset();
            document.getElementById('slug').value = "";
            existingImages = [];
            btn.textContent = 'Save Listing';
            btn.classList.replace('bg-blue-600', 'bg-pink-500');
            loadAdminProducts();
        });

        async function deleteProduct(slug) {
            if(!confirm("Are you sure?")) return;
            await fetch(`/api/decorations/${slug}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadAdminProducts();
        }

        async function loadAdminReviews() {
            const res = await fetch('/api/admin/reviews', { headers: { 'Authorization': `Bearer ${token}` }});
            const data = await res.json();
            document.getElementById('admin-review-list').innerHTML = data.map(rev => `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-5 border rounded-2xl bg-gray-50 gap-4">
                    <div>
                        <p class="font-bold text-gray-900">${rev.reviewer_name} <span class="text-yellow-500 ml-2">${'★'.repeat(rev.rating)}</span></p>
                        <p class="text-gray-600 mt-1 italic">"${rev.review_text}"</p>
                        <p class="text-xs text-gray-400 mt-1">Product: ${rev.decoration_slug}</p>
                    </div>
                    <button onclick="deleteReview(${rev.id})" class="bg-red-100 text-red-600 px-5 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition w-full md:w-auto">Delete</button>
                </div>
            `).join('');
        }

        async function deleteReview(id) {
            if(!confirm("Permanently delete this review?")) return;
            await fetch('/api/admin/reviews', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ id: id })
            });
            loadAdminReviews();
        }

        loadAdminProducts();
    </script>
</body>
</html>
