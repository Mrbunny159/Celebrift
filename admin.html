<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { background-color: #fbcfe8; color: #db2777; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r shadow-sm flex flex-col h-full">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-black text-gray-800">Celebrift <span class="text-pink-500">Admin</span></h1>
            <a href="index.html" class="text-xs text-gray-500 hover:text-pink-500 mt-1 inline-block">← View Live Site</a>
        </div>
        <nav class="flex-grow p-4 space-y-2 overflow-y-auto">
            <button onclick="switchTab('listings')" id="btn-listings" class="nav-btn active w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">📦 Listings</button>
            <button onclick="switchTab('faqs')" id="btn-faqs" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">❓ Global FAQs</button>
            <button onclick="switchTab('tnc')" id="btn-tnc" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">📄 Terms & Conditions</button>
            <button onclick="switchTab('refunds')" id="btn-refunds" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">💸 Refund & Returns</button>
            <button onclick="switchTab('about')" id="btn-about" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">🏢 About Us</button>
            <button onclick="switchTab('disclaimer')" id="btn-disclaimer" class="nav-btn w-full text-left px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition">⚠️ Disclaimer</button>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-gray-800">Logout</button>
        </div>
    </aside>

    <div id="tab-faqs" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Global Site FAQs</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border max-w-4xl">
                <p class="text-gray-500 mb-4 text-sm">Enter your global FAQs here (you can use plain text or basic HTML):</p>
                <textarea id="faqs-content" class="w-full p-4 border rounded-xl bg-gray-50 h-96 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Q: What is your cancellation policy?&#10;A: We offer full refunds..."></textarea>
                <button onclick="saveSetting('faqs', 'faqs-content')" class="mt-4 bg-pink-500 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save FAQs</button>
            </div>
        </div>

        <div id="tab-tnc" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Terms & Conditions</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border max-w-4xl">
                <textarea id="tnc-content" class="w-full p-4 border rounded-xl bg-gray-50 h-96 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter terms and conditions..."></textarea>
                <button onclick="saveSetting('tnc', 'tnc-content')" class="mt-4 bg-pink-500 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save Terms</button>
            </div>
        </div>

        <div id="tab-refunds" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Refunds & Returns</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border max-w-4xl">
                <textarea id="refunds-content" class="w-full p-4 border rounded-xl bg-gray-50 h-96 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter refund policy..."></textarea>
                <button onclick="saveSetting('refunds', 'refunds-content')" class="mt-4 bg-pink-500 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save Policy</button>
            </div>
        </div>

        <div id="tab-about" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">About Us</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border max-w-4xl">
                <textarea id="about-content" class="w-full p-4 border rounded-xl bg-gray-50 h-96 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter about us details..."></textarea>
                <button onclick="saveSetting('about', 'about-content')" class="mt-4 bg-pink-500 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save About Us</button>
            </div>
        </div>

        <div id="tab-disclaimer" class="tab-content">
            <h2 class="text-2xl font-bold mb-6">Disclaimer</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border max-w-4xl">
                <textarea id="disclaimer-content" class="w-full p-4 border rounded-xl bg-gray-50 h-96 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="Enter disclaimer..."></textarea>
                <button onclick="saveSetting('disclaimer', 'disclaimer-content')" class="mt-4 bg-pink-500 text-white px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Save Disclaimer</button>
            </div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin-login.html';

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }

        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // --- LISTING MANAGEMENT LOGIC (From your original admin.html) ---
        async function loadAdminProducts() {
            const res = await fetch('/api/decorations');
            const data = await res.json();
            document.getElementById('admin-product-list').innerHTML = data.map(item => `
                <div class="flex items-center justify-between p-3 border rounded-xl hover:bg-gray-50 transition">
                    <div class="flex items-center gap-4">
                        <img src="${item.image_url}" class="w-12 h-12 object-cover rounded-lg border">
                        <div>
                            <h3 class="font-bold text-gray-800">${item.title}</h3>
                            <p class="text-xs font-bold text-pink-500 uppercase tracking-wider">${item.category}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editProduct('${item.slug}')" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-200 transition">Edit</button>
                        <button onclick="deleteProduct('${item.slug}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-100 transition">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function editProduct(slug) {
            const res = await fetch(`/api/decorations/${slug}`);
            const item = await res.json();
            document.getElementById('title').value = item.title;
            document.getElementById('price').value = item.price_range;
            document.getElementById('category').value = item.category;
            document.getElementById('description').value = item.description;
            document.getElementById('image').value = item.image_url;
            
            const btn = document.getElementById('submit-btn');
            document.getElementById('form-title').innerText = "Edit Listing";
            btn.textContent = "Update Listing";
            btn.classList.replace('bg-pink-500', 'bg-blue-600');
            window.scrollTo({top: 0, behavior:'smooth'});
        }

        async function deleteProduct(slug) {
            if(!confirm("Are you sure you want to delete this listing?")) return;
            await fetch(`/api/decorations/${slug}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadAdminProducts();
        }

        loadAdminProducts();
// Function to save a setting
async function saveSetting(key, textareaId) {
    const content = document.getElementById(textareaId).value;
    const btn = event.target;
    const originalText = btn.textContent;
    
    btn.textContent = "Saving...";
    
    try {
        const res = await fetch(`/api/settings/${key}`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` 
            },
            body: JSON.stringify({ content })
        });
        
        if (res.ok) {
            btn.textContent = "Saved!";
            btn.classList.replace('bg-pink-500', 'bg-green-500');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.replace('bg-green-500', 'bg-pink-500');
            }, 2000);
        } else {
            alert("Failed to save.");
            btn.textContent = originalText;
        }
    } catch (e) {
        alert("Error connecting to server.");
        btn.textContent = originalText;
    }
}

// Function to load settings when the admin panel opens
// Function to load settings when the admin panel opens
async function loadSettings() {
    try {
        const res = await fetch('/api/settings');
        const settings = await res.json();
        
        // Populate the textareas if data exists
        if (settings['faqs']) document.getElementById('faqs-content').value = settings['faqs'];
        if (settings['tnc']) document.getElementById('tnc-content').value = settings['tnc'];
        if (settings['refunds']) document.getElementById('refunds-content').value = settings['refunds'];
        if (settings['about']) document.getElementById('about-content').value = settings['about'];
        if (settings['disclaimer']) document.getElementById('disclaimer-content').value = settings['disclaimer'];
    } catch (e) {
        console.error("Failed to load global settings");
    }
}
// Call loadSettings when page loads
loadSettings();
        /* NOTE: The functionality to save FAQs, T&C, About Us, etc. to the database
           will require setting up new tables in your PostgreSQL database and creating 
           corresponding POST/GET routes in api/index.py to handle global site settings. */
    </script>
</body>
</html>
