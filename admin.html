<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Celebrift Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-gray-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Celebrift <span class="text-pink-500">Admin</span></h1>
            <button onclick="logout()" class="text-sm bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg transition-colors">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit">
            <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Add New Decoration</h2>
            
            <form id="add-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Title</label>
                    <input type="text" id="title" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500 outline-none" placeholder="e.g. Blue Theme Birthday">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                    <select id="category" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500 outline-none">
                        <option value="birthday">Birthday</option>
                        <option value="baby-shower">Baby Shower</option>
                        <option value="anniversary">Anniversary</option>
                        <option value="romantic">Romantic</option>
                        <option value="store">Store Decor</option>
                        <option value="naming">Naming Ceremony</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Price Range</label>
                    <input type="text" id="price" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500 outline-none" placeholder="e.g. ₹2,999">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Image URL</label>
                    <input type="url" id="image" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500 outline-none" placeholder="https://...">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                    <textarea id="description" required rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500 outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Package Includes (Comma separated)</label>
                    <textarea id="includes" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-pink-500 outline-none" placeholder="100 Balloons, Happy Birthday Banner, Tape"></textarea>
                </div>

                <p id="form-message" class="text-sm hidden font-bold"></p>
                <button type="submit" id="submit-btn" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl transition-colors">
                    Save to Database
                </button>
            </form>
        </div>

        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Current Database Listings</h2>
            <div id="admin-product-list" class="space-y-4">
                <p class="text-gray-500 animate-pulse">Loading listings...</p>
            </div>
        </div>

    </div>

    <script>
        // 1. Security Check: Are they logged in?
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin-login.html'; // Kick them out if no token
        }

        // 2. Fetch and display existing products
        async function loadAdminProducts() {
            try {
                const res = await fetch('/api/decorations');
                const data = await res.json();
                let html = '';
                
                if(data.length === 0) {
                    document.getElementById('admin-product-list').innerHTML = '<p class="text-gray-500">No decorations found in database.</p>';
                    return;
                }

                data.forEach(item => {
                    html += `
                        <div class="flex items-center justify-between p-4 border rounded-xl hover:bg-gray-50 transition-colors">
                            <div class="flex items-center gap-4">
                                <img src="${item.image_url}" class="w-16 h-16 object-cover rounded-lg">
                                <div>
                                    <h3 class="font-bold text-gray-800">${item.title}</h3>
                                    <p class="text-sm text-gray-500">Category: ${item.category} | Views: ${item.views || 0}</p>
                                </div>
                            </div>
                            <button onclick="deleteProduct('${item.slug}')" class="bg-red-100 text-red-600 hover:bg-red-500 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                                Delete
                            </button>
                        </div>
                    `;
                });
                document.getElementById('admin-product-list').innerHTML = html;
            } catch (error) {
                document.getElementById('admin-product-list').innerHTML = '<p class="text-red-500">Error loading products.</p>';
            }
        }

        // 3. Handle Form Submission (Add Product)
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('form-message');
            btn.textContent = 'Saving...';

            // Auto-generate a slug from the title (e.g. "My Setup" -> "my-setup")
            const title = document.getElementById('title').value;
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            // Convert comma-separated string into a JSON array for the database
            const includesStr = document.getElementById('includes').value;
            const includesArray = includesStr ? includesStr.split(',').map(i => i.trim()) : [];

            const payload = {
                slug: slug,
                title: title,
                category: document.getElementById('category').value,
                price_range: document.getElementById('price').value,
                image_url: document.getElementById('image').value,
                description: document.getElementById('description').value,
                package_includes: includesArray,
                faqs: [] // Leaving empty for now to keep the UI simple
            };

            try {
                const res = await fetch('/api/decorations', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // PROVE WE ARE ADMIN
                    },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    msg.textContent = 'Added Successfully!';
                    msg.className = 'text-sm font-bold text-green-600 block';
                    document.getElementById('add-form').reset();
                    loadAdminProducts(); // Refresh the list
                } else {
                    throw new Error('Failed to save');
                }
            } catch (err) {
                msg.textContent = 'Error adding product.';
                msg.className = 'text-sm font-bold text-red-600 block';
            }
            btn.textContent = 'Save to Database';
        });

        // 4. Handle Delete
        async function deleteProduct(slug) {
            if(!confirm('Are you sure you want to delete this decoration forever?')) return;
            
            try {
                const res = await fetch(`/api/decorations/${slug}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) {
                    loadAdminProducts(); // Refresh the list
                } else {
                    alert('Error deleting product. Token may be invalid.');
                }
            } catch (error) {
                alert('Server error.');
            }
        }

        // 5. Logout
        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }

        // Start by loading the products
        loadAdminProducts();
    </script>
</body>
</html>
