<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #f9fafb; } </style>
</head>
<body class="font-sans min-h-screen flex flex-col pb-20 md:pb-0">

    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-pink-100">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl md:text-3xl font-extrabold text-gray-800 tracking-tight">
                <span class="text-pink-500">Celebr</span>ift 👑
            </a>
            <div class="hidden md:flex gap-6 text-sm font-bold text-gray-600">
                <a href="index.html" class="hover:text-pink-500 transition-colors">Home</a>
                <a href="index.html" class="hover:text-pink-500 transition-colors">All Decor</a>
                <a href="index.html" class="hover:text-pink-500 transition-colors">Contact</a>
            </div>
            <a href="index.html" class="md:hidden text-gray-600 hover:text-pink-500 font-bold transition-colors text-sm flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back
            </a>
        </div>
    </nav>

    <div id="loading-state" class="text-center py-20 font-bold text-pink-500 text-xl animate-pulse">Loading Setup Details...</div>

    <div id="detail-container" class="hidden flex-grow max-w-7xl mx-auto mt-6 px-4 w-full flex-col">
        
        <div class="max-w-5xl mx-auto w-full flex flex-col md:flex-row gap-8 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
            <div class="w-full md:w-1/2">
                <img id="decor-image" src="" class="w-full aspect-square object-cover rounded-xl border">
            </div>
            <div class="w-full md:w-1/2 flex flex-col">
                <h1 id="decor-title" class="text-3xl md:text-4xl font-bold text-gray-900 mb-2"></h1>
                <div id="decor-rating-stars" class="flex text-yellow-400 gap-1 mb-4"></div>
                <p id="decor-price" class="text-3xl font-bold text-pink-600 mb-6"></p>
                <p id="decor-desc" class="text-gray-600 mb-8 leading-relaxed"></p>

                <div class="hidden md:block space-y-3 border-t pt-6">
                    <details class="group border rounded-lg bg-gray-50"><summary class="p-4 font-bold cursor-pointer list-none flex justify-between">Package Includes <span class="text-pink-500">▼</span></summary>
                        <div id="desktop-package-list" class="p-4 border-t bg-white text-gray-600"></div>
                    </details>
                    <details class="group border rounded-lg bg-gray-50"><summary class="p-4 font-bold cursor-pointer list-none flex justify-between">FAQs <span class="text-pink-500">▼</span></summary>
                        <div id="desktop-faq-list" class="p-4 border-t bg-white text-gray-600"></div>
                    </details>
                </div>
            </div>
        </div>

        <div id="related-products-container" class="mt-16 w-full px-2"></div>

        <div class="max-w-5xl mx-auto w-full mt-16 mb-20 border-t pt-10">
            <h3 class="text-3xl font-extrabold text-gray-900 mb-8 text-center">Customer Feedback</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-pink-50 p-6 rounded-2xl border border-pink-100">
                    <h4 class="font-bold mb-4">Add Your Review</h4>
                    <form id="review-form" class="space-y-4">
                        <input type="text" id="rev-name" required placeholder="Name" class="w-full p-3 rounded-xl border outline-none focus:ring-2 focus:ring-pink-500">
                        <select id="rev-rating" class="w-full p-3 rounded-xl border outline-none focus:ring-2 focus:ring-pink-500">
                            <option value="5">5 Stars</option><option value="4">4 Stars</option>
                        </select>
                        <textarea id="rev-text" required rows="4" placeholder="Your experience..." class="w-full p-3 rounded-xl border outline-none focus:ring-2 focus:ring-pink-500"></textarea>
                        <button type="submit" id="rev-submit" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl shadow-md">Submit Review</button>
                        <p id="rev-msg" class="hidden text-center mt-2 font-bold"></p>
                    </form>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100">
                    <h4 class="font-bold mb-6 border-b pb-2">Recent Reviews</h4>
                    <div id="reviews-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="global.js"></script>
    <script src="details.js"></script>
</body>
</html>
