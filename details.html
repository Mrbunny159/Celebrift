<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="global.js"></script>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <div id="loading-state" class="text-center py-20 font-bold text-pink-500">Loading details...</div>

    <div id="detail-container" class="hidden max-w-7xl mx-auto w-full px-4 mt-10 flex-col flex-grow">
        <div class="max-w-6xl mx-auto w-full flex flex-col md:flex-row gap-10 bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100">
            <img id="decor-image" class="w-full md:w-1/2 aspect-square object-cover rounded-2xl shadow-inner">
            <div class="w-full md:w-1/2">
                <h1 id="decor-title" class="text-4xl font-black text-gray-900 mb-4"></h1>
                <p id="decor-price" class="text-3xl font-bold text-pink-600 mb-8"></p>
                <p id="decor-desc" class="text-gray-600 leading-relaxed mb-10 text-lg"></p>
                
                <details class="border-b py-4 group cursor-pointer"><summary class="font-bold flex justify-between">Package Includes <span class="group-open:rotate-180 transition">▼</span></summary><div id="desktop-package-list" class="pt-4 text-gray-500"></div></details>
                <details class="border-b py-4 group cursor-pointer"><summary class="font-bold flex justify-between">FAQs <span class="group-open:rotate-180 transition">▼</span></summary><div id="desktop-faq-list" class="pt-4 text-gray-500"></div></details>
            </div>
        </div>

        <div id="related-products-container" class="mt-20"></div>

        <div id="feedback-section" class="mt-20 mb-20">
            </div>
    </div>

    <script src="details.js"></script>
</body>
</html>
