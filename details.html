<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details | Celebrift</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        body { background-color: #f9fafb; } 
        .hide-scroll-bar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative">

    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 p-4 border-b border-pink-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-gray-800 flex items-center gap-2">
                <img src="/assets/logo.png" onerror="this.style.display='none'" class="w-8 h-8 object-contain"> Celebrift
            </a>
            <a href="index.html" class="text-pink-500 font-bold">&larr; Back</a>
        </div>
    </nav>

    <div id="loading-state" class="text-center py-20 font-bold text-pink-500 animate-pulse text-xl">Loading Magic...</div>

    <div id="detail-container" class="hidden flex-grow max-w-7xl mx-auto w-full px-4 mt-8 flex-col">
        
        <div class="max-w-6xl mx-auto w-full flex flex-col md:flex-row gap-10 bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100">
            <div class="w-full md:w-1/2">
                <img id="main-image" class="w-full aspect-[4/3] object-cover rounded-2xl shadow-sm mb-4 border">
                <div id="thumbnail-container" class="flex gap-4 overflow-x-auto hide-scroll-bar pb-2"></div>
            </div>

            <div class="w-full md:w-1/2 flex flex-col">
                <h1 id="decor-title" class="text-3xl md:text-5xl font-black mb-4 text-gray-900"></h1>
                <div id="decor-rating-stars" class="text-yellow-400 flex gap-1 mb-4 text-xl"></div>
                <p id="decor-price" class="text-4xl font-black text-pink-600 mb-8"></p>
                <p id="decor-desc" class="text-gray-600 mb-10 text-lg leading-relaxed"></p>
                
                <a id="whatsapp-btn" href="#" target="_blank" class="bg-[#25D366] text-white py-5 rounded-2xl font-black text-center text-xl shadow-lg hover:bg-[#1ebe57] transition-all transform hover:scale-[1.02] mb-10">
                    Book on WhatsApp
                </a>

                <div class="space-y-4">
                    <details class="border-b py-4 group cursor-pointer"><summary class="font-bold flex justify-between text-lg">Package Includes <span class="group-open:rotate-180 transition">▼</span></summary><div id="desktop-package-list" class="pt-4 text-gray-500 space-y-2"></div></details>
                    <details class="border-b py-4 group cursor-pointer"><summary class="font-bold flex justify-between text-lg">FAQs <span class="group-open:rotate-180 transition">▼</span></summary><div id="desktop-faq-list" class="pt-4 text-gray-500 space-y-2"></div></details>
                </div>
            </div>
        </div>

        <div id="related-products-container" class="mt-20 px-2"></div>

        <div class="max-w-6xl mx-auto w-full mt-24 mb-20 border-t border-gray-200 pt-16">
            <h3 class="text-4xl font-black text-gray-900 mb-12 text-center">Customer Feedback</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                
                <div class="bg-pink-50 p-8 rounded-3xl border border-pink-100 h-fit">
                    <h4 class="font-bold mb-6 text-xl text-gray-800">Leave a Review</h4>
                    <form id="review-form" class="space-y-5">
                        <input id="rev-name" required placeholder="Your Name" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-pink-500">
                        
                        <div class="bg-white p-4 rounded-xl border flex items-center justify-between">
                            <span class="font-bold text-gray-600">Rating:</span>
                            <div id="star-selector" class="flex gap-2 text-3xl cursor-pointer">
                                <span data-val="1" class="text-yellow-400">★</span>
                                <span data-val="2" class="text-yellow-400">★</span>
                                <span data-val="3" class="text-yellow-400">★</span>
                                <span data-val="4" class="text-yellow-400">★</span>
                                <span data-val="5" class="text-yellow-400">★</span>
                            </div>
                            <input type="hidden" id="rev-rating" value="5">
                        </div>

                        <textarea id="rev-text" required placeholder="Share your experience..." rows="4" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-pink-500"></textarea>
                        <button type="submit" id="rev-submit" class="w-full bg-pink-500 text-white py-5 rounded-2xl font-black text-lg shadow-md hover:bg-pink-600">Submit Feedback</button>
                    </form>
                </div>

                <div class="bg-white p-8 rounded-3xl border border-gray-100 h-fit">
                    <h4 class="font-bold mb-8 text-xl border-b pb-4 text-gray-800">Recent Reviews</h4>
                    <div id="reviews-list" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gradient-to-b from-white via-pink-50 to-purple-100 py-12 text-center text-xs font-bold border-t mt-auto uppercase tracking-widest text-gray-500">© 2026 CELEBRIFT</footer>
    
    <div class="fixed bottom-8 right-6 z-50 flex flex-col gap-4">
        <a href="tel:+919594328008" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-2xl text-2xl">📞</a>
        <a href="https://wa.me/919594328008" target="_blank" class="w-14 h-14 bg-green-500 text-white rounded-2xl flex items-center justify-center shadow-2xl text-2xl">💬</a>
    </div>

    <script src="details.js"></script>
</body>
</html>
