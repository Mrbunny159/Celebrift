<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoration Details | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans min-h-screen py-12 px-5">

    <div class="max-w-5xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-pink-500 hover:text-pink-600 font-medium mb-8 transition-colors">

                    Book on WhatsApp
                </a>

        </div>

        <div id="error-state" class="hidden text-center mt-20">

            <a href="index.html" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-6 rounded-full transition-colors">Return Home</a>

    <script src="details.js"></script>

</html>
