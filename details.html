<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #f9fafb; } </style>
</head>
<body class="font-sans min-h-screen pb-20 md:pb-10">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex items-center">
            <a href="index.html" class="text-gray-600 hover:text-pink-500 flex items-center gap-2 font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back
            </a>
        </div>
    </nav>

    <div id="loading-state" class="text-center py-20 text-xl font-bold text-pink-500 animate-pulse">Loading Product...</div>

    <div class="flex flex-col md:flex-row gap-8 bg-white p-4 md:p-8 rounded-2xl shadow-sm border border-gray-100">
            <div class="w-full md:w-1/2">
                <img id="decor-image" src="" class="w-full aspect-square object-cover rounded-xl border border-gray-100">
            </div>
            
            <div class="w-full md:w-1/2 flex flex-col">
                <h1 id="decor-title" class="text-2xl md:text-4xl font-bold text-gray-900 mb-2"></h1>
                <div id="decor-rating-stars" class="flex items-center gap-1 mb-4 text-yellow-400"></div>
                <p id="decor-price" class="text-3xl font-extrabold text-gray-900 mb-6"></p>
                <p id="decor-desc" class="text-gray-600 mb-6 leading-relaxed"></p>

                <div class="hidden md:block mb-8 space-y-2 border-t pt-4">
                    <details class="group border border-gray-200 rounded-lg bg-gray-50">
                        <summary class="flex justify-between items-center font-bold cursor-pointer list-none p-4 text-gray-800">
                            <span>Package Includes</span>
                            <span class="transition group-open:rotate-180">▼</span>
                        </summary>
                        <div class="p-4 border-t border-gray-200 text-gray-600">
                            <ul id="desktop-package-list" class="space-y-2"></ul>
                        </div>
                    </details>
                    <details class="group border border-gray-200 rounded-lg bg-gray-50">
                        <summary class="flex justify-between items-center font-bold cursor-pointer list-none p-4 text-gray-800">
                            <span>Frequently Asked Questions</span>
                            <span class="transition group-open:rotate-180">▼</span>
                        </summary>
                        <div id="desktop-faq-list" class="p-4 border-t border-gray-200 text-gray-600 space-y-4"></div>
                    </details>
                </div>

                <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t md:relative md:p-0 md:bg-transparent md:border-t-0 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] md:shadow-none">
                    <a id="whatsapp-btn" href="#" target="_blank" class="bg-[#25D366] hover:bg-[#1ebe57] text-white w-full py-4 rounded-xl text-lg font-bold flex justify-center items-center gap-2 shadow-lg transition-transform hover:scale-[1.02]">
                        Book on WhatsApp
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6 md:hidden">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Package Includes</h3>
                    <ul id="mobile-package-list" class="space-y-3 text-gray-700"></ul>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Frequently Asked Questions</h3>
                    <div id="mobile-faq-list" class="space-y-4"></div>
                </div>
            </div>

            <div class="md:col-span-3 lg:col-span-1 space-y-6">
                <div class="bg-pink-50 p-6 rounded-2xl shadow-sm border border-pink-100">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Leave Feedback</h3>
                    <form id="review-form" class="space-y-3">
                        <input type="text" id="rev-name" required placeholder="Your Name" class="w-full px-3 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-pink-500">
                        <select id="rev-rating" class="w-full px-3 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-pink-500">
                            <option value="5">5 Stars - Excellent!</option>
                            <option value="4">4 Stars - Very Good</option>
                            <option value="3">3 Stars - Good</option>
                            <option value="2">2 Stars - Fair</option>
                            <option value="1">1 Star - Poor</option>
                        </select>
                        <textarea id="rev-text" required rows="2" placeholder="Write your review..." class="w-full px-3 py-2 rounded-lg border outline-none focus:ring-2 focus:ring-pink-500"></textarea>
                        <button type="submit" id="rev-submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 rounded-lg transition-colors">Submit Review</button>
                        <p id="rev-msg" class="text-sm font-bold hidden"></p>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Customer Reviews</h3>
                    <div id="reviews-list" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Package Includes</h3>
                    <ul id="package-list" class="space-y-3 text-gray-700"></ul>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Frequently Asked Questions</h3>
                    <div id="faq-list" class="space-y-4"></div>
                </div>
            </div>

            <div class="md:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Customer Reviews</h3>
                    <div id="reviews-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="details.js"></script>
</body>
</html>
