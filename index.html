<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrift | Event Decorations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdf2f8; background-image: radial-gradient(#f9a8d4 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="font-sans min-h-screen py-8 px-4 relative overflow-x-hidden">

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-tight mb-3">
                <span class="text-pink-500">Celebr</span>ift 👑
            </h1>
            <p class="text-sm md:text-lg text-gray-700 max-w-2xl mx-auto bg-white/60 p-2 md:p-4 rounded-xl backdrop-blur-sm border border-pink-100">
                Premium Event Decorations. Book your perfect setup today.
            </p>
        </header>

        <div class="flex overflow-x-auto pb-4 mb-8 gap-3 hide-scroll-bar" id="category-filters">
            <button onclick="fetchDecorations('all')" class="filter-btn shrink-0 bg-pink-500 text-white px-5 py-2 rounded-full text-sm font-bold shadow-sm transition-all">All</button>
            <button onclick="fetchDecorations('birthday')" class="filter-btn shrink-0 bg-white text-gray-700 border border-pink-200 px-5 py-2 rounded-full text-sm font-semibold transition-all">Birthdays</button>
            <button onclick="fetchDecorations('baby-shower')" class="filter-btn shrink-0 bg-white text-gray-700 border border-pink-200 px-5 py-2 rounded-full text-sm font-semibold transition-all">Baby Showers</button>
            <button onclick="fetchDecorations('anniversary')" class="filter-btn shrink-0 bg-white text-gray-700 border border-pink-200 px-5 py-2 rounded-full text-sm font-semibold transition-all">Anniversaries</button>
            <button onclick="fetchDecorations('romantic')" class="filter-btn shrink-0 bg-white text-gray-700 border border-pink-200 px-5 py-2 rounded-full text-sm font-semibold transition-all">Romantic</button>
        </div>

        <div id="decor-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
