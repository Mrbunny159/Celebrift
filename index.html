<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrift | Event Decorations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="global.js"></script>
    <style>
        .hide-scroll-bar::-webkit-scrollbar { display: none; }
        .hide-scroll-bar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <section class="bg-white py-12 border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-10">
                <h2 class="text-3xl md:text-4xl font-black text-gray-900">Top Decoration Categories</h2>
                <p class="text-gray-500 mt-2 font-medium">Mira Bhayandar's Most Trusted Decorators</p>
            </div>
            
            <div class="flex overflow-x-auto gap-10 justify-start md:justify-center pb-6 hide-scroll-bar">
                <div onclick="location.href='#cat-birthday'" class="flex flex-col items-center gap-3 cursor-pointer group">
                    <div class="w-28 h-28 md:w-36 md:h-36 rounded-full overflow-hidden border-4 border-white shadow-lg group-hover:border-pink-500 transition-all">
                        <img src="https://images.unsplash.com/photo-1530103862676-de3c9de59f9e?w=300" class="w-full h-full object-cover">
                    </div>
                    <span class="font-bold text-gray-700">Birthday</span>
                </div>
                </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto w-full px-4 py-16 flex-grow">
        <div id="rows-container" class="space-y-20">
            <div class="text-center text-pink-500 animate-pulse font-bold">Loading setups...</div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
