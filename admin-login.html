<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Celebrift</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center px-4">

    <div class="bg-white max-w-md w-full p-8 rounded-3xl shadow-xl border border-gray-100 text-center">
        <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Celebrift <span class="text-pink-500">Admin</span></h1>
        <p class="text-gray-500 mb-8">Enter your master password to manage listings.</p>

        <form id="login-form" class="space-y-6">
            <div>
                <input type="password" id="password" required placeholder="Enter Admin Password" class="w-full px-5 py-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all">
            </div>
            <p id="error-message" class="text-red-500 text-sm hidden font-medium"></p>
            <button type="submit" id="submit-btn" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-4 rounded-xl transition-colors">
                Login to Dashboard
            </button>
        </form>
        
        <a href="index.html" class="inline-block mt-6 text-sm text-pink-500 hover:underline">← Back to public site</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.textContent = 'Verifying...';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save the secure token to the browser and redirect
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html'; 
                } else {
                    errorMsg.textContent = data.message || 'Incorrect password.';
                    errorMsg.classList.remove('hidden');
                    submitBtn.textContent = 'Login to Dashboard';
                }
            } catch (error) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.classList.remove('hidden');
                submitBtn.textContent = 'Login to Dashboard';
            }
        });
    </script>
</body>
</html>
